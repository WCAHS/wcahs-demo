<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" href="../favicon.png">
  <title>WCAHS Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sage: { 50: '#f6f7f4', 100: '#e8ebe3', 200: '#d2d8c8', 300: '#b3bea3', 400: '#93a27e', 500: '#758762', 600: '#5c6b4e', 700: '#48543e', 800: '#3b4434', 900: '#33392e' },
            amber: { 50: '#fffbeb', 100: '#fef3c7', 200: '#fde68a', 300: '#fcd34d', 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706', 700: '#b45309' },
            warm: { 50: '#fdf8f3' }
          },
          fontFamily: { display: ['Playfair Display', 'serif'], body: ['Nunito', 'sans-serif'] }
        }
      }
    }
  </script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    body { font-family: 'Nunito', sans-serif; background-color: #fdf8f3; }
    .font-display { font-family: 'Playfair Display', serif; }
    .sidebar-link { transition: background 0.15s; }
    .sidebar-link:hover, .sidebar-link.active { background: rgba(255,255,255,0.15); }
    .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; font-size: 11px; font-weight: 700; border-radius: 999px; padding: 0 6px; }
    @media (max-width: 767px) {
      #dashboard { flex-direction: column; }
      #sidebar { position: fixed; inset: 0; z-index: 50; transform: translateX(-100%); transition: transform 0.2s ease; width: 100%; max-width: 280px; height: 100vh; }
      #sidebar.open { transform: translateX(0); }
      #sidebarOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 49; }
      #sidebar.open + #sidebarOverlay { display: block; }
      #mobileHeader { display: flex !important; }
    }
    @media (min-width: 768px) {
      #mobileHeader { display: none !important; }
      #sidebarOverlay { display: none !important; }
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-sm border border-sage-100 p-8 w-full max-w-sm">
      <div class="text-center mb-6">
        <img src="../images/logo.png" alt="WCAHS" class="h-12 mx-auto mb-3">
        <h1 class="font-display font-bold text-xl text-sage-800">Admin Login</h1>
      </div>
      <div id="setupForm" class="hidden mb-4 p-4 bg-amber-50 border border-amber-200 rounded-2xl">
        <p class="text-amber-800 text-sm font-semibold mb-2">First-time setup</p>
        <p class="text-amber-700 text-xs mb-3">Create your admin account.</p>
      </div>
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
          <input id="loginUser" type="text" class="w-full border border-gray-200 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-sage-600" required>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
          <input id="loginPass" type="password" class="w-full border border-gray-200 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-sage-600" required>
        </div>
        <div class="cf-turnstile" data-sitekey="0x4AAAAAADpVDd5Mx-hY1fTZ" data-theme="light"></div>
        <div id="loginError" class="hidden text-red-600 text-sm"></div>
        <button type="submit" class="w-full bg-sage-700 hover:bg-sage-900 text-white font-bold py-3 rounded-2xl transition">Log In</button>
      </form>
    </div>
  </div>

  <!-- Admin Dashboard (hidden until authenticated) -->
  <div id="dashboard" class="hidden min-h-screen md:flex">
    <!-- Mobile Header -->
    <div id="mobileHeader" class="hidden bg-sage-900 text-white px-4 py-3 items-center justify-between sticky top-0 z-40">
      <button onclick="document.getElementById('sidebar').classList.toggle('open')" class="p-1">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <img src="../images/logo.png" alt="WCAHS" class="h-7 brightness-200">
      <span class="text-sage-300 text-xs">Admin</span>
    </div>
    <!-- Sidebar -->
    <div id="sidebarOverlay" onclick="document.getElementById('sidebar').classList.remove('open')"></div>
    <aside id="sidebar" class="w-56 bg-sage-900 text-white flex flex-col shrink-0 md:sticky top-0 h-screen">
      <div class="p-4 border-b border-sage-800">
        <img src="../images/logo.png" alt="WCAHS" class="h-8 brightness-200">
        <p class="text-sage-300 text-xs mt-1">Admin Panel</p>
      </div>
      <nav class="flex-1 py-3 space-y-0.5 px-2 overflow-y-auto">
        <a onclick="navigate('submissions')" class="sidebar-link block px-3 py-2.5 rounded-lg text-sm cursor-pointer flex items-center justify-between" data-nav="submissions">
          <span>Inbox</span>
          <span id="inboxBadge" class="badge bg-amber-500 text-white hidden">0</span>
        </a>
        <a onclick="navigate('lost-found')" class="sidebar-link block px-3 py-2.5 rounded-lg text-sm cursor-pointer flex items-center justify-between" data-nav="lost-found">
          <span>Lost & Found</span>
          <span id="lfBadge" class="badge bg-amber-500 text-white hidden">0</span>
        </a>
        <a onclick="navigate('events')" class="sidebar-link block px-3 py-2.5 rounded-lg text-sm cursor-pointer" data-nav="events">Events</a>
        <a onclick="navigate('faq')" class="sidebar-link block px-3 py-2.5 rounded-lg text-sm cursor-pointer admin-only" data-nav="faq">FAQ</a>
        <a onclick="navigate('settings')" class="sidebar-link block px-3 py-2.5 rounded-lg text-sm cursor-pointer admin-only" data-nav="settings">Site Settings</a>
        <a onclick="navigate('users')" class="sidebar-link block px-3 py-2.5 rounded-lg text-sm cursor-pointer admin-only" data-nav="users">Users</a>
        <a onclick="navigate('api-status')" class="sidebar-link block px-3 py-2.5 rounded-lg text-sm cursor-pointer admin-only" data-nav="api-status">API Status</a>
      </nav>
      <div class="p-4 border-t border-sage-800 space-y-2">
        <a href="https://accounts.zoho.com/signin" target="_blank" class="block text-center bg-sage-700 hover:bg-sage-600 text-sage-200 text-xs font-semibold py-2 px-3 rounded-lg transition">Check Email</a>
        <a onclick="navigate('my-account')" class="sidebar-link block px-3 py-2 rounded-lg text-xs cursor-pointer text-sage-300 hover:text-white" data-nav="my-account">My Account</a>
        <p class="text-sage-300 text-xs" id="loggedInAs"></p>
        <button onclick="logout()" class="text-sage-400 hover:text-white text-xs transition">Log out</button>
      </div>
    </aside>

    <!-- Main content area -->
    <main class="flex-1 p-4 md:p-8 overflow-y-auto min-w-0">
      <div id="content"></div>
    </main>
  </div>

<script>
// ── API helpers ──
async function api(path, opts = {}) {
  const res = await fetch('/api' + path, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  return res.json();
}

// ── Auth ──
let isSetup = false;

async function checkAuth() {
  try {
    const res = await api('/auth/me');
    if (res.username) { showDashboard(res); return; }
  } catch(e) {}
  // Check if setup needed
  try {
    const res = await api('/auth/setup', { method: 'POST', body: { username: '', password: '' } });
  } catch(e) {}
  document.getElementById('loginScreen').classList.remove('hidden');
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const user = document.getElementById('loginUser').value;
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.classList.add('hidden');

  const turnstileEl = document.querySelector('[name="cf-turnstile-response"]');
  const turnstileToken = turnstileEl ? turnstileEl.value : '';

  // Try setup first (creates account if no users exist)
  const setupRes = await api('/auth/setup', { method: 'POST', body: { username: user, password: pass } });

  const loginRes = await api('/auth/login', { method: 'POST', body: { username: user, password: pass, turnstile_token: turnstileToken } });
  if (loginRes.ok) {
    showDashboard(loginRes);
  } else {
    errEl.textContent = loginRes.error || 'Login failed';
    errEl.classList.remove('hidden');
  }
});

let currentRole = 'staff';

function showDashboard(user) {
  currentRole = user.role;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('loggedInAs').textContent = user.username + ' (' + user.role + ')';
  // Hide admin-only nav items for staff
  if (user.role !== 'admin') {
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
  }
  navigate('submissions');
  loadBadgeCounts();
}

async function logout() {
  await api('/auth/logout', { method: 'POST' });
  location.reload();
}

async function loadBadgeCounts() {
  try {
    const subs = await api('/admin/submissions');
    const unread = subs.filter(s => !s.is_read).length;
    const badge = document.getElementById('inboxBadge');
    if (unread > 0) { badge.textContent = unread; badge.classList.remove('hidden'); }
    else { badge.classList.add('hidden'); }

    const reports = await api('/admin/lost-found');
    const pending = reports.filter(r => r.status === 'pending').length;
    const lfBadge = document.getElementById('lfBadge');
    if (pending > 0) { lfBadge.textContent = pending; lfBadge.classList.remove('hidden'); }
    else { lfBadge.classList.add('hidden'); }
  } catch(e) {}
}

// ── Navigation ──
function navigate(page) {
  // Close sidebar on mobile
  var sb = document.getElementById('sidebar');
  if (sb) sb.classList.remove('open');
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  const link = document.querySelector(`[data-nav="${page}"]`);
  if (link) link.classList.add('active');
  const content = document.getElementById('content');
  switch(page) {
    case 'submissions': renderSubmissions(content); break;
    case 'lost-found': renderLostFound(content); break;
    case 'events': renderEvents(content); break;
    case 'faq': renderFaq(content); break;
    case 'settings': renderSettings(content); break;
    case 'about': renderAbout(content); break;
    case 'users': renderUsers(content); break;
    case 'my-account': renderMyAccount(content); break;
    case 'api-status': renderApiStatus(content); break;
    default: content.innerHTML = '<p class="text-gray-400">Select a section</p>';
  }
}

// ── Helpers ──
function h(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
function fmtPhone(p) { if(!p)return''; const d=p.replace(/\D/g,''); if(d.length===10)return'('+d.substring(0,3)+') '+d.substring(3,6)+'-'+d.substring(6); if(d.length===11&&d[0]==='1')return'('+d.substring(1,4)+') '+d.substring(4,7)+'-'+d.substring(7); return p; }
function formatDate(d) { if (!d) return ''; return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
function timeAgo(dt) {
  const d = new Date(dt.endsWith('Z') ? dt : dt + 'Z'); const now = new Date(); const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'just now'; if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago'; return Math.floor(diff/86400) + 'd ago';
}
function localTime(dt) {
  if (!dt) return '';
  const d = new Date(dt.endsWith('Z') ? dt : dt + 'Z');
  return d.toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true });
}

// ── Submissions ──
async function renderSubmissions(el) {
  el.innerHTML = '<h1 class="text-2xl font-display font-bold text-sage-800 mb-6">Inbox</h1><p class="text-gray-400">Loading...</p>';
  const data = await api('/admin/submissions');
  if (data.error) { el.innerHTML += '<p class="text-red-500">' + data.error + '</p>'; return; }

  const tabs = `<div class="flex gap-2 mb-6">
    <button onclick="filterSubs('all')" class="sub-tab px-4 py-2 rounded-full text-sm font-semibold bg-sage-700 text-white">All (${data.length})</button>
    <button onclick="filterSubs('contact')" class="sub-tab px-4 py-2 rounded-full text-sm font-semibold bg-gray-200 text-gray-700">Contact (${data.filter(s=>s.type==='contact').length})</button>
    <button onclick="filterSubs('foster')" class="sub-tab px-4 py-2 rounded-full text-sm font-semibold bg-gray-200 text-gray-700">Foster (${data.filter(s=>s.type==='foster').length})</button>
  </div>`;

  const statusLabels = { new: 'New', contacted: 'Contacted', followup: 'Follow-up', closed: 'Closed' };
  const statusColors = { new: 'bg-amber-100 text-amber-700', contacted: 'bg-blue-100 text-blue-700', followup: 'bg-purple-100 text-purple-700', closed: 'bg-gray-100 text-gray-500' };

  let html = '<h1 class="text-2xl font-display font-bold text-sage-800 mb-6">Inbox</h1>' + tabs;
  if (data.length === 0) {
    html += '<div class="bg-white rounded-2xl p-8 text-center text-gray-400">No submissions yet</div>';
  } else {
    html += '<div id="subsList" class="space-y-4">';
    data.forEach(s => {
      const unread = !s.is_read;
      const st = s.status || 'new';
      let phone = '';
      let msg = s.message;
      const phoneMatch = msg.match(/^Phone: (.+?)\n\n/);
      if (phoneMatch) { phone = phoneMatch[1]; msg = msg.replace(phoneMatch[0], ''); }

      html += `<div class="sub-item bg-white rounded-2xl shadow-sm overflow-hidden ${unread ? 'border-l-4 border-amber-400' : ''}" data-type="${s.type}">
        <div class="flex items-center gap-3 p-4 cursor-pointer hover:bg-sage-50 transition" onclick="toggleSub(${s.id}); ${unread ? 'markRead('+s.id+', true)' : ''}">
          <div class="w-10 h-10 rounded-full ${s.type==='foster' ? 'bg-sage-100' : 'bg-blue-50'} flex items-center justify-center shrink-0">
            <span class="text-sm font-bold ${s.type==='foster' ? 'text-sage-700' : 'text-blue-600'}">${h(s.name.charAt(0).toUpperCase())}</span>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-bold text-gray-900 text-sm">${h(s.name)}</span>
              <span class="text-xs px-2 py-0.5 rounded-full ${s.type==='foster' ? 'bg-sage-100 text-sage-700' : 'bg-blue-100 text-blue-700'}">${s.type}</span>
              <span class="text-xs px-2 py-0.5 rounded-full ${statusColors[st]}">${statusLabels[st] || st}</span>
            </div>
            <p class="text-xs text-gray-400 mt-0.5 truncate">${h(s.email)}${s.subject && s.subject !== 'General Inquiry' ? ' &bull; ' + h(s.subject) : ''} &bull; ${timeAgo(s.created_at)}</p>
          </div>
          <svg class="w-5 h-5 text-gray-300 shrink-0 transition-transform" id="sub-arrow-${s.id}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
        <div id="sub-${s.id}" class="hidden border-t border-gray-100 p-5">
          <div class="flex flex-wrap items-center gap-3 text-sm mb-3">
            <a href="mailto:${h(s.email)}" class="text-sage-700 hover:underline">${h(s.email)}</a>
            ${phone ? '<a href="tel:' + phone.replace(/\\D/g,'') + '" class="text-sage-700 hover:underline">' + h(fmtPhone(phone)) + '</a>' : ''}
            ${s.subject && s.subject !== 'General Inquiry' ? '<span class="text-gray-400">&bull; ' + h(s.subject) + '</span>' : ''}
          </div>
          <p class="text-sm text-gray-700 whitespace-pre-wrap mb-4">${h(msg)}</p>
          <div class="flex items-center gap-3 flex-wrap pt-3 border-t border-gray-100">
            <select onchange="updateSubStatus(${s.id}, this.value)" class="text-xs border border-gray-200 rounded-lg px-2 py-1 bg-white">
              ${Object.entries(statusLabels).map(([k,v]) => '<option value="'+k+'"'+(st===k?' selected':'')+'>'+v+'</option>').join('')}
            </select>
            ${unread ? `<button onclick="event.stopPropagation(); markRead(${s.id}, true)" class="text-xs text-sage-700 hover:underline">Mark read</button>` : `<button onclick="event.stopPropagation(); markRead(${s.id}, false)" class="text-xs text-gray-400 hover:underline">Mark unread</button>`}
            <button onclick="event.stopPropagation(); if(confirm('Delete this submission?')) deleteSub(${s.id})" class="text-xs text-red-400 hover:underline ml-auto">Delete</button>
          </div>
        </div>
      </div>`;
    });
    html += '</div>';
  }
  el.innerHTML = html;
  window._subsData = data;
}

window.filterSubs = function(type) {
  document.querySelectorAll('.sub-item').forEach(el => {
    el.style.display = (type === 'all' || el.dataset.type === type) ? '' : 'none';
  });
  document.querySelectorAll('.sub-tab').forEach(b => { b.className = b.className.replace(/bg-sage-700 text-white|bg-gray-200 text-gray-700/g, ''); });
  event.target.classList.add('bg-sage-700', 'text-white');
};

window.toggleSub = function(id) {
  var el = document.getElementById('sub-' + id);
  var arrow = document.getElementById('sub-arrow-' + id);
  el.classList.toggle('hidden');
  arrow.style.transform = el.classList.contains('hidden') ? '' : 'rotate(180deg)';
};

window.markRead = async function(id, read) {
  await api('/admin/submissions/' + id, { method: 'PUT', body: { is_read: read } });
  navigate('submissions'); loadBadgeCounts();
};

window.updateSubStatus = async function(id, status) {
  await api('/admin/submissions/' + id, { method: 'PUT', body: { status: status, is_read: true } });
  loadBadgeCounts();
};

window.deleteSub = async function(id) {
  await api('/admin/submissions/' + id, { method: 'DELETE' });
  navigate('submissions'); loadBadgeCounts();
};

// ── Lost & Found ──
async function renderLostFound(el) {
  el.innerHTML = '<h1 class="text-2xl font-display font-bold text-sage-800 mb-6">Lost & Found Reports</h1><p class="text-gray-400">Loading...</p>';
  const data = await api('/admin/lost-found');
  if (data.error) { el.innerHTML += '<p class="text-red-500">' + data.error + '</p>'; return; }

  let html = '<h1 class="text-2xl font-display font-bold text-sage-800 mb-6">Lost & Found Reports</h1>';
  const statuses = { pending: 'Pending Review', approved: 'Approved', resolved: 'Resolved', rejected: 'Rejected' };
  const statusColors = { pending: 'bg-amber-100 text-amber-700', approved: 'bg-sage-100 text-sage-700', resolved: 'bg-blue-100 text-blue-700', rejected: 'bg-red-100 text-red-700' };

  if (data.length === 0) {
    html += '<div class="bg-white rounded-2xl p-8 text-center text-gray-400">No reports submitted</div>';
  } else {
    html += '<div class="space-y-4">';
    data.forEach(r => {
      // Parse photo URLs
      let photos = [];
      if (r.photo_url) { try { photos = JSON.parse(r.photo_url); } catch(e) { photos = [r.photo_url]; } }
      const thumbUrl = photos[0] || '';

      html += `<div class="bg-white rounded-2xl shadow-sm overflow-hidden">
        <div class="flex items-center gap-4 p-4 cursor-pointer hover:bg-sage-50 transition" onclick="toggleReport(${r.id})">
          ${thumbUrl ? '<img src="'+thumbUrl+'" class="w-14 h-14 rounded-xl object-cover shrink-0">' : '<div class="w-14 h-14 rounded-xl bg-gray-100 flex items-center justify-center shrink-0"><svg class="w-6 h-6 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div>'}
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-bold text-gray-900">${h(r.pet_name || 'Unknown ' + r.species)}</span>
              <span class="text-xs px-2 py-0.5 rounded-full ${r.type==='lost' ? 'bg-red-100 text-red-700' : 'bg-sage-100 text-sage-700'}">${r.type}</span>
              <span class="text-xs px-2 py-0.5 rounded-full ${statusColors[r.status]}">${statuses[r.status]}</span>
            </div>
            <p class="text-xs text-gray-400 mt-0.5">${h(r.species)}${r.breed ? ' &bull; ' + h(r.breed) : ''} &bull; ${h(r.reporter_name)} &bull; ${timeAgo(r.created_at)}</p>
          </div>
          <svg class="w-5 h-5 text-gray-300 shrink-0 transition-transform" id="arrow-${r.id}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
        <div id="report-${r.id}" class="hidden border-t border-gray-100 p-5">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
              <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Pet Details</h4>
              <div class="space-y-1 text-sm">
                <p><span class="text-gray-400">Species:</span> <span class="font-semibold">${h(r.species)}</span></p>
                ${r.breed ? '<p><span class="text-gray-400">Breed:</span> <span class="font-semibold">'+h(r.breed)+'</span></p>' : ''}
                ${r.color ? '<p><span class="text-gray-400">Color:</span> <span class="font-semibold">'+h(r.color)+'</span></p>' : ''}
                ${r.gender ? '<p><span class="text-gray-400">Gender:</span> <span class="font-semibold">'+h(r.gender)+'</span></p>' : ''}
                ${r.collar_details ? '<p><span class="text-gray-400">Collar:</span> <span class="font-semibold">'+h(r.collar_details)+'</span></p>' : ''}
                ${r.temperament ? '<p><span class="text-gray-400">Temperament:</span> <span class="font-semibold">'+h(r.temperament)+'</span></p>' : ''}
                ${r.current_location ? '<p><span class="text-gray-400">Currently:</span> <span class="font-semibold">'+h(r.current_location)+'</span></p>' : ''}

function buildTimeOptions(selected) {
  let opts = '<option value="">--</option>';
  for (let h = 0; h < 24; h++) {
    for (let m = 0; m < 60; m += 15) {
      const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
      const ampm = h < 12 ? 'AM' : 'PM';
      const label = h12 + ':' + (m < 10 ? '0' : '') + m + ' ' + ampm;
      opts += `<option value="${label}" ${selected===label?'selected':''}>${label}</option>`;
    }
  }
  return opts;
}

function eventFormHtml(ev) {
  const e = ev || {};
  // Parse existing time like "10:00 AM - 2:00 PM" into start/end
  let startTime = '', endTime = '';
  if (e.time) {
    const parts = e.time.split(/\s*[-–]\s*/);
    startTime = (parts[0] || '').trim();
    endTime = (parts[1] || '').trim();
  }
  // Parse location — might be "Venue, Address" format
  let venue = '', address = '';
  if (e.location) {
    const lParts = e.location.split(/, (.+)/);
    venue = lParts[0] || '';
    address = lParts[1] || '';
  }
  const badges = ['Adoption Event', 'Fundraiser', 'Community Event', 'Volunteer Event', 'Pet Expo', 'Other'];
  const curBadge = e.badge || '';
  const isCustomBadge = curBadge && !badges.includes(curBadge);

  return `<div class="bg-sage-50 rounded-2xl p-6 mb-6 border border-sage-200">
    <h3 class="font-bold text-gray-900 mb-4">${ev ? 'Edit Event' : 'New Event'}</h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div class="md:col-span-2"><label class="block text-xs font-semibold text-gray-600 mb-1">Event Title *</label><input id="evTitle" value="${h(e.title||'')}" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="e.g. Adoption Day at Tractor Supply"></div>
      <div><label class="block text-xs font-semibold text-gray-600 mb-1">Start Date *</label><input id="evDate" type="date" value="${e.date||''}" class="w-full border rounded-lg px-3 py-2 text-sm"></div>
      <div><label class="block text-xs font-semibold text-gray-600 mb-1">End Date <span class="font-normal text-gray-400">(multi-day)</span></label><input id="evEndDate" type="date" value="${e.end_date||''}" class="w-full border rounded-lg px-3 py-2 text-sm"></div>
      <div><label class="block text-xs font-semibold text-gray-600 mb-1">Event Type</label>
        <select id="evBadgeSelect" onchange="if(this.value==='custom'){document.getElementById('evBadgeCustom').classList.remove('hidden')}else{document.getElementById('evBadgeCustom').classList.add('hidden')}" class="w-full border rounded-lg px-3 py-2 text-sm">
          <option value="">None</option>
          ${badges.map(b => '<option value="'+b+'"'+(curBadge===b?' selected':'')+'>'+b+'</option>').join('')}
          <option value="custom" ${isCustomBadge?'selected':''}>Custom...</option>
        </select>
        <input id="evBadgeCustom" class="${isCustomBadge?'':'hidden'} w-full border rounded-lg px-3 py-2 text-sm mt-2" value="${isCustomBadge?h(curBadge):''}" placeholder="Custom event type">
      </div>
      <div><label class="block text-xs font-semibold text-gray-600 mb-1">Start Time</label>
        <select id="evStartTime" class="w-full border rounded-lg px-3 py-2 text-sm">${buildTimeOptions(startTime)}</select></div>
      <div><label class="block text-xs font-semibold text-gray-600 mb-1">End Time</label>
        <select id="evEndTime" class="w-full border rounded-lg px-3 py-2 text-sm">${buildTimeOptions(endTime)}</select></div>
      <div><label class="block text-xs font-semibold text-gray-600 mb-1">Venue Name</label><input id="evVenue" value="${h(venue)}" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="e.g. Tractor Supply Co."></div>
      <div><label class="block text-xs font-semibold text-gray-600 mb-1">Address</label><input id="evAddress" value="${h(address)}" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="e.g. 123 Main St, Waseca"></div>

window.saveEvent = async function(id) {
  // Combine time fields
  const startTime = document.getElementById('evStartTime').value;
  const endTime = document.getElementById('evEndTime').value;
  let time = '';
  if (startTime && endTime) time = startTime + ' – ' + endTime;
  else if (startTime) time = startTime;

  // Combine location fields
  const venue = document.getElementById('evVenue').value.trim();
  const address = document.getElementById('evAddress').value.trim();
  let location = '';
  if (venue && address) location = venue + ', ' + address;
  else location = venue || address;

  // Badge from dropdown or custom
  const badgeSelect = document.getElementById('evBadgeSelect').value;
  const badgeCustom = document.getElementById('evBadgeCustom').value.trim();
  const badge = badgeSelect === 'custom' ? badgeCustom : badgeSelect;

  const endDate = document.getElementById('evEndDate').value;

  const body = {
    title: document.getElementById('evTitle').value,
    date: document.getElementById('evDate').value,
    end_date: endDate || null,
    time: time,
    location: location,
    description: document.getElementById('evDesc').value,
    badge: badge,
    color: 'auto',
    published: document.getElementById('evPublished').checked,
  };
  if (!body.title || !body.date) { alert('Title and date are required'); return; }
  if (id) { await api('/admin/events/' + id, { method: 'PUT', body }); }
  else { await api('/admin/events', { method: 'POST', body }); }
  navigate('events');
};

window.deleteEvent = async function(id) {
  await api('/admin/events/' + id, { method: 'DELETE' });
  navigate('events');
};

      </div>
      <p class="text-xs text-gray-400 mt-1">Select "All Pages" or pick specific pages</p>
    </div>
  </div>

  <button onclick="saveSettings()" class="bg-sage-700 hover:bg-sage-900 text-white font-bold px-6 py-3 rounded-lg transition">Save Settings</button>
  <span id="settingsSaved" class="text-sm font-bold ml-3 hidden" style="color:#5c6b4e;">Settings saved!</span>`;

  // Render partners list
  const partnerArr = Array.isArray(data.partners) ? data.partners : (data.partners ? data.partners.split(',').map(s=>s.trim()).filter(Boolean) : []);
  setTimeout(() => renderPartnersList(partnerArr), 0);
}

// Partners list management
let _partners = [];
window.renderPartnersList = function(partners) {
  _partners = partners;
  const el = document.getElementById('partnersList');
  if (!el) return;
  el.innerHTML = partners.map((p, i) =>
    `<div class="flex items-center justify-between bg-gray-50 rounded-lg px-3 py-2">
      <span class="text-sm text-gray-800">${h(p)}</span>
      <button onclick="removePartner(${i})" class="text-red-500 text-xs hover:underline">Remove</button>
    </div>`
  ).join('') || '<p class="text-gray-400 text-xs">No partners added</p>';
};
window.addPartner = function() {
  const input = document.getElementById('newPartner');
  const val = input.value.trim();
  if (!val) return;
  _partners.push(val);
  input.value = '';
  renderPartnersList(_partners);
};
window.removePartner = function(i) {
  _partners.splice(i, 1);
  renderPartnersList(_partners);
};

window.handleUcPageToggle = function(el) {
  const checks = document.querySelectorAll('#ucPages input');
  if (el.value === 'all' && el.checked) {
    checks.forEach(c => { if (c.value !== 'all') c.checked = false; });
  } else if (el.value !== 'all') {
    checks.forEach(c => { if (c.value === 'all') c.checked = false; });
  }
};

window.handleAnnPageToggle = function(el) {
  const checks = document.querySelectorAll('#annPages input');
  if (el.value === 'all' && el.checked) {
    checks.forEach(c => { if (c.value !== 'all') c.checked = false; });
  } else if (el.value !== 'all') {
    checks.forEach(c => { if (c.value === 'all') c.checked = false; });
  }
};

window.saveSettings = async function() {
  try {
  const annChecks = [...document.querySelectorAll('#annPages input:checked')].map(c => c.value);
  const annPages = annChecks.length > 0 ? (annChecks.includes('all') ? 'all' : annChecks.join(',')) : 'all';
  const ucChecks = [...document.querySelectorAll('#ucPages input:checked')].map(c => c.value);
  const ucPages = ucChecks.length > 0 ? (ucChecks.includes('all') ? 'all' : ucChecks.join(',')) : 'all';
  const res = await api('/admin/settings', { method: 'PUT', body: {
    phone: document.getElementById('setPhone').value,
    email: document.getElementById('setEmail').value,
    address: document.getElementById('setAddress').value,
    address_note: document.getElementById('setAddressNote').value,
    zeffy_url: document.getElementById('setZeffy').value,
    facebook_url: document.getElementById('setFb').value,
    partners: _partners,
    under_construction: document.getElementById('setUcEnabled').checked ? 'true' : 'false',
    under_construction_pages: ucPages,
    announcement_enabled: document.getElementById('setAnnEnabled').checked ? 'true' : 'false',
    announcement_text: document.getElementById('setAnnText').value,
    announcement_pages: annPages,
  }});
  const saved = document.getElementById('settingsSaved');
  if (res.error) {
    saved.textContent = 'Error: ' + JSON.stringify(res.error);
    saved.style.background = '#fef3c7'; saved.style.color = '#92400e';
  } else {
    saved.textContent = 'Settings saved!';
    saved.style.background = '#e8ebe3'; saved.style.color = '#3b4434';
  }
  saved.style.padding = '6px 14px'; saved.style.borderRadius = '8px';
  saved.classList.remove('hidden');
  setTimeout(() => { saved.classList.add('hidden'); }, 3000);
  } catch(err) {
    const saved = document.getElementById('settingsSaved');
    saved.textContent = 'JS Error: ' + err.message;
    saved.style.background = '#fef3c7'; saved.style.color = '#92400e';
    saved.style.padding = '6px 14px'; saved.style.borderRadius = '8px';
    saved.classList.remove('hidden');
  }
};

// ── API Status ──
async function renderApiStatus(el) {
  el.innerHTML = '<h1 class="text-2xl font-display font-bold text-sage-800 mb-6">API Status</h1><p class="text-gray-400">Loading...</p>';
  let data;
  try { data = await api('/admin/sync-status'); } catch(e) { data = { error: e.message }; }
  if (data.error) { el.innerHTML = '<h1 class="text-2xl font-display font-bold text-sage-800 mb-6">API Status</h1><p class="text-amber-700 bg-amber-50 p-4 rounded-2xl">Could not load: ' + h(data.error) + '</p>'; return; }

  const statusIcon = (s) => s === 'success'
    ? '<span class="inline-block w-2.5 h-2.5 rounded-full bg-green-500 mr-2"></span>'
    : '<span class="inline-block w-2.5 h-2.5 rounded-full bg-red-400 mr-2"></span>';

  const lastSync = data.recent_syncs[0];
  const isHealthy = lastSync?.status === 'success';

  el.innerHTML = `<h1 class="text-2xl font-display font-bold text-sage-800 mb-6">API Status</h1>

  <div class="bg-white rounded-2xl p-6 shadow-sm mb-6">
    <div class="flex items-center gap-3 mb-4">
      <span class="w-3 h-3 rounded-full ${isHealthy ? 'bg-green-500' : 'bg-amber-500'}"></span>
      <h2 class="font-bold text-gray-900">ShelterLuv Sync</h2>
      <span class="text-xs px-3 py-1 rounded-full ${isHealthy ? 'bg-sage-100 text-sage-700' : 'bg-amber-100 text-amber-700'}">${isHealthy ? 'Healthy' : 'Issue'}</span>
    </div>
    <div class="grid grid-cols-3 gap-4 mb-4">
      <div class="text-center"><p class="text-2xl font-bold text-sage-700">${data.current_animals}</p><p class="text-gray-400 text-xs">Animals</p></div>
      <div class="text-center"><p class="text-2xl font-bold text-sage-700">${data.last_success ? timeAgo(data.last_success) : '—'}</p><p class="text-gray-400 text-xs">Last Sync</p></div>
      <div class="text-center"><p class="text-2xl font-bold text-sage-700">1 min</p><p class="text-gray-400 text-xs">Interval</p></div>
    </div>
    <button onclick="triggerSync()" id="syncBtn" class="bg-sage-700 hover:bg-sage-800 text-white font-semibold text-sm px-4 py-2 rounded-2xl transition">Sync Now</button>
    <span id="syncStatus" class="text-sm ml-3 hidden"></span>
  </div>

  <div class="bg-white rounded-2xl p-6 shadow-sm">
    <h3 class="font-bold text-gray-900 text-sm mb-3">Recent Syncs</h3>
    ${data.recent_syncs.length === 0 ? '<p class="text-gray-400 text-sm">No syncs yet</p>' :
    '<div class="space-y-1">' + data.recent_syncs.slice(0, 5).map(s => `
      <div class="flex items-center justify-between py-1.5 text-xs">
        <div class="flex items-center gap-2">${statusIcon(s.status)}<span class="${s.status === 'success' ? 'text-gray-600' : 'text-amber-600'}">${s.status === 'success' ? s.animal_count + ' animals' : 'Error'}</span></div>
        <span class="text-gray-400">${localTime(s.synced_at)}</span>
      </div>
    `).join('') + '</div>'}
  </div>`;

}

window.triggerSync = async function() {
  const btn = document.getElementById('syncBtn');
  const status = document.getElementById('syncStatus');
  btn.disabled = true; btn.textContent = 'Syncing...';
  status.classList.add('hidden');
  try {
    const res = await fetch('https://wcahs-shelterluv-sync.wcahs.workers.dev/trigger', { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      status.className = 'text-sm ml-3 text-sage-700'; status.textContent = 'Sync triggered! Refreshing...';
      status.classList.remove('hidden');
      setTimeout(() => navigate('api-status'), 2000);
    } else {
      status.className = 'text-sm ml-3 text-red-500'; status.textContent = 'Failed';
      status.classList.remove('hidden');
    }
  } catch(e) {
    status.className = 'text-sm ml-3 text-red-500'; status.textContent = 'Could not reach sync worker';
    status.classList.remove('hidden');
  }
  btn.disabled = false; btn.textContent = 'Trigger Manual Sync';
};

      <div><label class="block text-xs font-semibold text-gray-600 mb-1">Confirm New Password</label><input id="cpConfirm" type="password" class="w-full border rounded-lg px-3 py-2 text-sm"></div>
      <div id="cpStatus" class="hidden text-sm"></div>
      <button onclick="changeMyPassword()" class="bg-sage-700 hover:bg-sage-900 text-white font-semibold text-sm px-4 py-2 rounded-lg">Change Password</button>
    </div>
  </div>`;
}

window.changeMyPassword = async function() {
  const current = document.getElementById('cpCurrent').value;
  const newPass = document.getElementById('cpNew').value;
  const confirm = document.getElementById('cpConfirm').value;
  const status = document.getElementById('cpStatus');

  if (!current || !newPass) { status.className = 'text-sm text-red-600'; status.textContent = 'All fields required'; status.classList.remove('hidden'); return; }
  if (newPass !== confirm) { status.className = 'text-sm text-red-600'; status.textContent = 'New passwords don\'t match'; status.classList.remove('hidden'); return; }

  const res = await api('/admin/change-password', { method: 'POST', body: { current_password: current, new_password: newPass } });
  if (res.ok) {
    status.className = 'text-sm text-sage-700'; status.textContent = res.message || 'Password changed!';
    document.getElementById('cpCurrent').value = '';
    document.getElementById('cpNew').value = '';
    document.getElementById('cpConfirm').value = '';
  } else {
    status.className = 'text-sm text-red-600'; status.textContent = res.error || 'Failed';
  }
  status.classList.remove('hidden');
};

  el.innerHTML = html;

window.showUserForm = function() {
  document.getElementById('userFormArea').innerHTML = `<div class="bg-sage-50 rounded-2xl p-6 mb-6 border border-sage-200">
    <h3 class="font-bold text-gray-900 mb-4">New User</h3>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
      <div><label class="block text-xs font-semibold text-gray-600 mb-1">Username *</label><input id="nuUser" class="w-full border rounded-lg px-3 py-2 text-sm"></div>
      <div><label class="block text-xs font-semibold text-gray-600 mb-1">Password * (min 8 chars)</label><input id="nuPass" type="password" class="w-full border rounded-lg px-3 py-2 text-sm"></div>
      <div><label class="block text-xs font-semibold text-gray-600 mb-1">Role *</label>
        <select id="nuRole" class="w-full border rounded-lg px-3 py-2 text-sm">
          <option value="staff">Staff</option>
          <option value="admin">Admin</option>
        </select></div>
    </div>
    <div class="flex gap-2">
      <button onclick="createUser()" class="bg-sage-700 hover:bg-sage-900 text-white font-semibold text-sm px-4 py-2 rounded-lg">Create User</button>
      <button onclick="document.getElementById('userFormArea').innerHTML=''" class="text-gray-500 text-sm px-4 py-2">Cancel</button>
    </div>
  </div>`;
};

window.createUser = async function() {
  const username = document.getElementById('nuUser').value;
  const password = document.getElementById('nuPass').value;
  const role = document.getElementById('nuRole').value;
  if (!username || !password) { alert('Username and password required'); return; }
  const res = await api('/admin/users', { method: 'POST', body: { username, password, role } });
  if (res.ok) { navigate('users'); }
  else { alert(res.error || 'Failed to create user'); }
};

window.resetUserPassword = async function(id, username) {
  const newPass = prompt('New password for ' + username + ' (min 8 characters):');
  if (!newPass) return;
  const res = await api('/admin/users/' + id, { method: 'PUT', body: { password: newPass } });
  if (res.ok) { alert('Password reset for ' + username); }
  else { alert(res.error || 'Failed to reset password'); }
};

window.deleteUser = async function(id) {
  const res = await api('/admin/users/' + id, { method: 'DELETE' });
  if (res.ok) { navigate('users'); }
  else { alert(res.error || 'Failed to delete user'); }
};
