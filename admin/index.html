<!DOCTYPE html>

  <!-- Turnstile not needed on admin login (password-protected) -->
  <style>
    body { font-family: 'Nunito', sans-serif; background-color: #fdf8f3; }
    .font-display { font-family: 'Playfair Display', serif; }
    .sidebar-link { transition: all 0.15s ease; border-radius: 10px; }
    .sidebar-link:hover { background: rgba(255,255,255,0.1); }
    .sidebar-link.active { background: rgba(255,255,255,0.15); border-left: 3px solid #fbbf24; padding-left: 9px; }

    .card { background: white; border-radius: 16px; border: 1px solid #e8ebe3; box-shadow: 0 1px 3px rgba(59,68,52,0.04); }
    .card-warm { background: #fffcf8; border-radius: 16px; border: 1px solid #e8ebe3; box-shadow: 0 1px 3px rgba(59,68,52,0.04); }

    /* Quill overrides */
    .ql-toolbar.ql-snow { border-radius: 10px 10px 0 0; border-color: #d2d8c8; background: #f6f7f4; }
    .ql-container.ql-snow { border-radius: 0 0 10px 10px; border-color: #d2d8c8; min-height: 120px; font-family: 'Nunito', sans-serif; font-size: 14px; }
    .ql-editor { min-height: 100px; }

    /* Chart bar hover */
    .chart-bar { transition: opacity 0.15s; cursor: default; }
    .chart-bar:hover { opacity: 0.85; }
    .chart-bar-tooltip { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #3b4434; color: white; font-size: 11px; padding: 2px 8px; border-radius: 6px; white-space: nowrap; margin-bottom: 4px; }
    .chart-bar:hover .chart-bar-tooltip { display: block; }

    /* Inbox item accents */
    .inbox-item { border-left: 4px solid transparent; transition: all 0.15s ease; }
    .inbox-item.type-contact { border-left-color: #3b82f6; }
    .inbox-item.type-foster { border-left-color: #5c6b4e; }
    .inbox-item.type-lost { border-left-color: #ef4444; }
    .inbox-item.type-found { border-left-color: #22c55e; }
    .inbox-item.unread { background: #fffcf8; border-left-width: 4px; }
    .inbox-item.unread .inbox-name { font-weight: 800; }
    .inbox-item.read { opacity: 0.75; }
    .inbox-item.read:hover { opacity: 1; }

    /* Status dots */
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .status-dot.new { background: #f59e0b; }
    .status-dot.contacted { background: #3b82f6; }
    .status-dot.followup { background: #8b5cf6; }
    .status-dot.closed { background: #9ca3af; }
    .status-dot.pending { background: #f59e0b; }
    .status-dot.approved { background: #22c55e; }
    .status-dot.resolved { background: #3b82f6; }
    .status-dot.rejected { background: #ef4444; }

    /* Filter tabs */
    .filter-tab { padding: 6px 16px; border-radius: 999px; font-size: 13px; font-weight: 600; transition: all 0.15s; cursor: pointer; border: 1.5px solid transparent; }
    .filter-tab.active { background: #48543e; color: white; border-color: #48543e; }
    .filter-tab:not(.active) { background: white; color: #6b7280; border-color: #e8ebe3; }
    .filter-tab:not(.active):hover { border-color: #b3bea3; color: #48543e; }

    .filter-tabs-scroll { display: flex; gap: 8px; flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; scrollbar-width: none; }
    .filter-tabs-scroll::-webkit-scrollbar { display: none; }
    .filter-tabs-scroll .filter-tab { white-space: nowrap; flex-shrink: 0; }

    @media (max-width: 767px) {

    }
    @media (min-width: 768px) {
      #mobileHeader { display: none !important; }
      #sidebarOverlay { display: none !important; }

<script>
// ── API helpers ──
async function api(path, opts = {}) {
  const res = await fetch('/api' + path, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  return res.json();
}

// ── Auth ──
let isSetup = false;

async function checkAuth() {
  try {
    const res = await api('/auth/me');
    if (res.username) { showDashboard(res); return; }
  } catch(e) {
    console.error('Auth check failed:', e);
  }
  document.getElementById('loginScreen').classList.remove('hidden');
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const user = document.getElementById('loginUser').value;
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = 'Logging in...';
  errEl.style.color = '#5c6b4e';
  errEl.classList.remove('hidden');

  const turnstileEl = document.querySelector('[name="cf-turnstile-response"]');
  const turnstileToken = turnstileEl ? turnstileEl.value : '';

  const setupRes = await api('/auth/setup', { method: 'POST', body: { username: user, password: pass } });

  try {
    const loginRes = await api('/auth/login', { method: 'POST', body: { username: user, password: pass, turnstile_token: turnstileToken } });
    if (loginRes.ok) {
      showDashboard(loginRes);
    } else {
      errEl.textContent = loginRes.error || 'Login failed';
      errEl.classList.remove('hidden');
    }
  } catch(loginErr) {
    errEl.textContent = 'Login error: ' + loginErr.message;
    errEl.classList.remove('hidden');
  }
});

let currentRole = 'staff';
let currentUsername = '';

function showDashboard(user) {
  try {
    currentRole = user.role;
    currentUsername = user.username;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    document.getElementById('loggedInAs').textContent = user.username + ' (' + user.role + ')';
    if (user.role !== 'admin') {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
    }
    const validPages = ['submissions','pets','events','faq','settings','about','users','my-account','analytics'];
    const savedPage = sessionStorage.getItem('wcahs_admin_page');
    navigate(validPages.includes(savedPage) ? savedPage : 'submissions');
    loadBadgeCounts();
  } catch(e) {
    console.error('Dashboard error:', e);
    document.getElementById('content').innerHTML = '<p class="text-red-500">Error loading dashboard: ' + e.message + '</p>';
  }
}

async function logout() {
  await api('/auth/logout', { method: 'POST' });
  location.reload();
}

// Cache for inbox data
let _subsData = [];
let _lfData = [];

async function loadBadgeCounts() {
  try {
    const subs = await api('/admin/submissions');
    _subsData = subs;
    const reports = await api('/admin/lost-found');
    _lfData = reports;

    const unreadSubs = Array.isArray(subs) ? subs.filter(s => !s.is_read).length : 0;
    const pendingLF = Array.isArray(reports) ? reports.filter(r => r.status === 'pending').length : 0;
    const totalBadge = unreadSubs + pendingLF;

    const badge = document.getElementById('inboxBadge');
    if (totalBadge > 0) { badge.textContent = totalBadge; badge.classList.remove('hidden'); }
    else { badge.classList.add('hidden'); }
  } catch(e) {}
}

// ── Navigation ──
function navigate(page) {
  var sb = document.getElementById('sidebar');
  if (sb) sb.classList.remove('open');
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  const link = document.querySelector(`[data-nav="${page}"]`);
  if (link) link.classList.add('active');
  const content = document.getElementById('content');
  _quillInstances = {};
  try { sessionStorage.setItem('wcahs_admin_page', page); } catch(e) {}
  switch(page) {
    case 'submissions': renderSubmissions(content); break;
    case 'pets': renderPets(content); break;
    case 'events': renderEvents(content); break;
    case 'email': renderEmail(content); break;
    case 'faq': renderFaq(content); break;
    case 'settings': renderSettings(content); break;
    case 'about': renderAbout(content); break;
    case 'users': renderUsers(content); break;
    case 'my-account': renderMyAccount(content); break;
    case 'analytics': renderAnalytics(content); break;
    default: sessionStorage.removeItem('wcahs_admin_page'); renderSubmissions(content); break;
  }
}

// ── Helpers ──
function h(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
function fmtPhone(p) { if(!p)return''; const d=p.replace(/\D/g,''); if(d.length===10)return'('+d.substring(0,3)+') '+d.substring(3,6)+'-'+d.substring(6); if(d.length===11&&d[0]==='1')return'('+d.substring(1,4)+') '+d.substring(4,7)+'-'+d.substring(7); return p; }
function formatDate(d) { if (!d) return ''; return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
function timeAgo(dt) {
  const d = new Date(dt.endsWith('Z') ? dt : dt + 'Z'); const now = new Date(); const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'just now'; if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago'; return Math.floor(diff/86400) + 'd ago';
}
function localTime(dt) {
  if (!dt) return '';
  const fixed = dt.replace(' ', 'T').replace(/([^Z])$/, '$1Z');
  const d = new Date(fixed);
  if (isNaN(d)) return '';
  return d.toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true });
}
function minutesAgo(dt) {
  if (!dt) return null;
  // D1 timestamps are UTC but formatted as "2026-06-23 23:21:08" — need T separator and Z suffix
  const fixed = dt.replace(' ', 'T').replace(/([^Z])$/, '$1Z');
  const d = new Date(fixed);
  if (isNaN(d)) return null;
  return Math.floor((new Date() - d) / 60000);
}

// ── Quill helpers ──
let _quillInstances = {};

function initQuill(containerId, initialHtml) {
  setTimeout(() => {
    const container = document.getElementById(containerId);
    if (!container) return;
    const q = new Quill('#' + containerId, {
      theme: 'snow',
      modules: {
        toolbar: [['bold', 'italic', 'underline'], ['link'], [{ list: 'ordered' }, { list: 'bullet' }]]
      }
    });
    if (initialHtml) {
      // Clean up plain text with newlines — convert to paragraphs if no HTML tags present
      let cleaned = initialHtml;
      if (!/<[a-z][\s\S]*>/i.test(cleaned)) {
        cleaned = cleaned.split(/\n\n+/).map(p => '<p>' + p.replace(/\n/g, '<br>') + '</p>').join('');
      }
      q.root.innerHTML = cleaned;
    }
    _quillInstances[containerId] = q;
  }, 50);
}

function getQuillHtml(containerId) {
  const q = _quillInstances[containerId];
  if (!q) return '';
  const html = q.root.innerHTML;
  return html === '<p><br></p>' ? '' : html;
}

// ── Submissions (Unified Inbox) ──
let _inboxFilter = 'all';

async function renderSubmissions(el) {
  el.innerHTML = '<h1 class="text-2xl font-display font-bold text-sage-800 mb-6">Inbox</h1><p class="text-gray-400">Loading...</p>';

  const [subs, reports] = await Promise.all([
    api('/admin/submissions'),
    api('/admin/lost-found')
  ]);
  if (subs.error) { el.innerHTML += '<p class="text-red-500">' + subs.error + '</p>'; return; }

  _subsData = Array.isArray(subs) ? subs : [];
  _lfData = Array.isArray(reports) ? reports : [];

  // Build unified list
  const allItems = [];

  _subsData.forEach(s => {
    let phone = '';
    let msg = s.message;
    const phoneMatch = msg.match(/^Phone: (.+?)\n\n/);
    if (phoneMatch) { phone = phoneMatch[1]; msg = msg.replace(phoneMatch[0], ''); }
    allItems.push({
      kind: 'submission',
      itemType: s.type, // contact or foster
      id: s.id,
      name: s.name,
      email: s.email,
      phone: phone,
      subject: s.subject,
      message: msg,
      rawMessage: s.message,
      status: s.status || 'new',
      is_read: s.is_read,
      created_at: s.created_at,
      _raw: s
    });
  });

  _lfData.forEach(r => {
    allItems.push({
      kind: 'lf',
      itemType: r.type, // lost or found
      id: r.id,
      name: r.reporter_name,
      email: r.reporter_email || '',
      phone: r.reporter_phone || '',
      petName: r.pet_name,
      species: r.species,
      breed: r.breed,
      color: r.color,
      gender: r.gender,
      collar_details: r.collar_details,
      temperament: r.temperament,
      current_location: r.current_location,
      collar_status: r.collar_status,
      description: r.description,
      location_details: r.location_details,
      photo_url: r.photo_url,
      status: r.status || 'pending',
      is_read: r.status !== 'pending', // pending = unread
      created_at: r.created_at,
      _raw: r
    });
  });

  // Sort by date descending
  allItems.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  // Counts
  const counts = {
    all: allItems.length,
    contact: allItems.filter(i => i.itemType === 'contact').length,
    foster: allItems.filter(i => i.itemType === 'foster').length,
    lost: allItems.filter(i => i.itemType === 'lost').length,
    found: allItems.filter(i => i.itemType === 'found').length
  };

  const tabBtn = (key, label) => {
    const isActive = _inboxFilter === key;
    return `<button onclick="filterInbox('${key}')" class="filter-tab ${isActive ? 'active' : ''}">${label} (${counts[key]})</button>`;
  };

  let html = `<h1 class="text-2xl font-display font-bold text-sage-800 mb-5">Inbox</h1>
    <div class="filter-tabs-scroll mb-5">
      ${tabBtn('all', 'All')}
      ${tabBtn('contact', 'Contact')}
      ${tabBtn('foster', 'Foster')}
      ${tabBtn('lost', 'Lost')}
      ${tabBtn('found', 'Found')}
    </div>`;

  if (allItems.length === 0) {
    html += `<div class="card p-10 text-center">
      <svg class="w-16 h-16 mx-auto text-sage-200 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-2.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
      <p class="text-gray-400 font-semibold">Inbox is empty</p>
      <p class="text-gray-300 text-sm mt-1">New submissions and reports will appear here</p>
    </div>`;
  } else {
    html += '<div id="inboxList" class="space-y-2">';
    allItems.forEach(item => {
      const unread = !item.is_read;
      const readClass = unread ? 'unread' : 'read';

      // Avatar colors by type
      const avatarColors = { contact: 'bg-blue-50 text-blue-600', foster: 'bg-sage-100 text-sage-700', lost: 'bg-red-50 text-red-600', found: 'bg-green-50 text-green-700' };
      const avatarClass = avatarColors[item.itemType] || 'bg-gray-100 text-gray-600';

      // Thumbnail for L&F
      let thumbHtml = '';
      if (item.kind === 'lf' && item.photo_url) {
        let photos = [];
        try { photos = JSON.parse(item.photo_url); } catch(e) { photos = [item.photo_url]; }
        if (photos[0]) {
          thumbHtml = `<img src="${photos[0]}" class="w-10 h-10 rounded-xl object-cover shrink-0">`;
        }
      }
      if (!thumbHtml) {
        const initial = item.name ? item.name.charAt(0).toUpperCase() : '?';
        thumbHtml = `<div class="w-10 h-10 rounded-xl ${avatarClass} flex items-center justify-center shrink-0"><span class="text-sm font-bold">${h(initial)}</span></div>`;
      }

      // Title line
      let titleExtra = '';
      if (item.kind === 'lf') {
        const petLabel = item.petName || ('Unknown ' + (item.species || 'Pet'));
        titleExtra = ` &mdash; <span class="text-gray-500 font-normal">${h(petLabel)}</span>`;
      }

      // Subtitle
      let subtitle = '';
      if (item.kind === 'submission') {
        subtitle = h(item.email);
        if (item.subject && item.subject !== 'General Inquiry') subtitle += ' &bull; ' + h(item.subject);
      } else {
        subtitle = h(item.species || '');
        if (item.breed) subtitle += ' &bull; ' + h(item.breed);
        if (item.location_details) subtitle += ' &bull; ' + h(item.location_details);
      }
      subtitle += ' &bull; ' + timeAgo(item.created_at);

      const clickId = item.kind === 'submission' ? 'sub-' + item.id : 'lf-' + item.id;
      const arrowId = item.kind === 'submission' ? 'sub-arrow-' + item.id : 'lf-arrow-' + item.id;
      const markReadCall = (item.kind === 'submission' && unread) ? `markRead(${item.id}, true);` : '';

      html += `<div class="inbox-item card type-${item.itemType} ${readClass} overflow-hidden" data-type="${item.itemType}">
        <div class="flex items-center gap-3 p-4 cursor-pointer hover:bg-warm-50 transition" onclick="toggleInboxItem('${clickId}', '${arrowId}'); ${markReadCall}">
          ${thumbHtml}
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="status-dot ${item.status}" title="${item.status}"></span>
              <span class="inbox-name text-gray-900 text-sm">${h(item.name)}${titleExtra}</span>
            </div>
            <p class="text-xs text-gray-400 mt-0.5 truncate">${subtitle}</p>
          </div>
          <svg class="w-5 h-5 text-gray-300 shrink-0 transition-transform" id="${arrowId}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
        <div id="${clickId}" class="hidden border-t border-sage-100">`;

      // Expanded content
      if (item.kind === 'submission') {
        html += renderSubExpanded(item);
      } else {
        html += renderLFExpanded(item);
      }

      html += `</div></div>`;
    });
    html += '</div>';
  }

  el.innerHTML = html;
}

window.toggleInboxItem = function(elId, arrowId) {
  var el = document.getElementById(elId);
  var arrow = document.getElementById(arrowId);
  if (!el) return;
  el.classList.toggle('hidden');
  if (arrow) arrow.style.transform = el.classList.contains('hidden') ? '' : 'rotate(180deg)';
};

window.filterInbox = function(type) {
  _inboxFilter = type;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  if (event && event.target) event.target.classList.add('active');
  document.querySelectorAll('.inbox-item').forEach(el => {
    el.style.display = (type === 'all' || el.dataset.type === type) ? '' : 'none';
  });
};

        const unsub = c.unsubscribed;

        html += `<div class="card p-4 flex items-center justify-between flex-wrap gap-2">
          <div class="flex items-center gap-3 min-w-0">
            <div class="w-9 h-9 rounded-xl ${unsub ? 'bg-gray-100 text-gray-400' : 'bg-sage-100 text-sage-700'} flex items-center justify-center shrink-0">

            </div>

function buildTimeOptions(selected) {
  let opts = '<option value="">--</option>';
  for (let h = 0; h < 24; h++) {
    for (let m = 0; m < 60; m += 15) {
      const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
      const ampm = h < 12 ? 'AM' : 'PM';
      const label = h12 + ':' + (m < 10 ? '0' : '') + m + ' ' + ampm;
      opts += `<option value="${label}" ${selected===label?'selected':''}>${label}</option>`;
    }
  }
  return opts;
}

          <option value="">None</option>
          ${badges.map(b => '<option value="'+b+'"'+(curBadge===b?' selected':'')+'>'+b+'</option>').join('')}

        </select>
        <input id="evBadgeCustom" class="${isCustomBadge?'':'hidden'} w-full border border-sage-200 rounded-xl px-3 py-2.5 text-sm mt-2 focus:outline-none focus:ring-2 focus:ring-sage-400" value="${isCustomBadge?h(curBadge):''}" placeholder="Custom event type">

window.saveEvent = async function(id) {
  const startTime = document.getElementById('evStartTime').value;
  const endTime = document.getElementById('evEndTime').value;
  let time = '';
  if (startTime && endTime) time = startTime + ' – ' + endTime;
  else if (startTime) time = startTime;

  const venue = document.getElementById('evVenue').value.trim();
  const address = document.getElementById('evAddress').value.trim();
  let location = '';
  if (venue && address) location = venue + ', ' + address;
  else location = venue || address;

  const badgeSelect = document.getElementById('evBadgeSelect').value;
  const badgeCustom = document.getElementById('evBadgeCustom').value.trim();
  const badge = badgeSelect === 'custom' ? badgeCustom : badgeSelect;

  const endDate = document.getElementById('evEndDate').value;

  const body = {
    title: document.getElementById('evTitle').value,
    date: document.getElementById('evDate').value,
    end_date: endDate || null,
    time: time,
    location: location,
    description: document.getElementById('evDesc').value,
    badge: badge,
    color: 'auto',
    published: document.getElementById('evPublished').checked,
  };
  if (!body.title || !body.date) { alert('Title and date are required'); return; }
  if (id) { await api('/admin/events/' + id, { method: 'PUT', body }); }
  else { await api('/admin/events', { method: 'POST', body }); }
  navigate('events');
};

};

// Partners list management
let _partners = [];
window.renderPartnersList = function(partners) {
  _partners = partners;
  const el = document.getElementById('partnersList');
  if (!el) return;
  el.innerHTML = partners.map((p, i) =>
    `<div class="flex items-center justify-between bg-sage-50 rounded-xl px-3 py-2">
      <span class="text-sm text-gray-800">${h(p)}</span>
      <button onclick="removePartner(${i})" class="text-red-500 text-xs hover:underline">Remove</button>
    </div>`
  ).join('') || '<p class="text-gray-400 text-xs">No partners added</p>';
};
window.addPartner = function() {
  const input = document.getElementById('newPartner');
  const val = input.value.trim();
  if (!val) return;
  _partners.push(val);
  input.value = '';
  renderPartnersList(_partners);
};
window.removePartner = function(i) {
  _partners.splice(i, 1);
  renderPartnersList(_partners);
};

window.updateAnnCharCount = function() {
  const input = document.getElementById('setAnnText');
  const counter = document.getElementById('annCharCount');
  if (input && counter) {
    counter.textContent = input.value.length;
    counter.style.color = input.value.length > 100 ? '#d97706' : '';
  }
};

window.updateAnnColorPreview = function() {
  const select = document.getElementById('setAnnColor');
  const preview = document.getElementById('annColorPreview');
  const colors = { sage: '#48543e', amber: '#d97706', red: '#dc2626', blue: '#2563eb', dark: '#1f2937' };
  if (select && preview) preview.style.background = colors[select.value] || colors.sage;
};


window.saveSettings = async function() {
  try {
  const body = {
    phone: document.getElementById('setPhone').value,
    email: document.getElementById('setEmail').value,
    zeffy_url: document.getElementById('setZeffy').value,
    facebook_url: document.getElementById('setFb').value,
    partners: _partners,
    announcement_enabled: document.getElementById('setAnnEnabled').checked ? 'true' : 'false',
    announcement_text: document.getElementById('setAnnText').value,
    announcement_pages: 'all',
    announcement_color: document.getElementById('setAnnColor').value,
  };
  // Under construction — only save if techadmin
  const ucEl = document.getElementById('setUcEnabled');
  if (ucEl) {
    body.under_construction = ucEl.checked ? 'true' : 'false';
    body.under_construction_pages = 'all';
  }
  const res = await api('/admin/settings', { method: 'PUT', body });
  const saved = document.getElementById('settingsSaved');
  if (res.error) {
    saved.textContent = 'Error: ' + JSON.stringify(res.error);
    saved.style.background = '#fef3c7'; saved.style.color = '#92400e';
  } else {
    saved.textContent = 'Settings saved!';
    saved.style.background = '#e8ebe3'; saved.style.color = '#3b4434';
  }
  saved.style.padding = '6px 14px'; saved.style.borderRadius = '10px';
  saved.classList.remove('hidden');
  setTimeout(() => { saved.classList.add('hidden'); }, 3000);
  } catch(err) {
    const saved = document.getElementById('settingsSaved');
    saved.textContent = 'JS Error: ' + err.message;
    saved.style.background = '#fef3c7'; saved.style.color = '#92400e';
    saved.style.padding = '6px 14px'; saved.style.borderRadius = '10px';
    saved.classList.remove('hidden');
  }
};

let analyticsRange = '7d';
async function renderAnalytics(el) {
  el.innerHTML = '<h1 class="text-2xl font-display font-bold text-sage-800 mb-6">Analytics</h1><p class="text-gray-400">Loading...</p>';
  let data;
  try { data = await api('/admin/analytics?range=' + analyticsRange); } catch(e) { data = { error: e.message }; }
  if (data.error) {
    el.innerHTML = `<h1 class="text-2xl font-display font-bold text-sage-800 mb-6">Analytics</h1>
      <p class="text-amber-700 bg-amber-50 p-4 rounded-2xl">${h(data.error)}</p>
      ${data.details ? '<pre class="text-xs text-gray-500 mt-2">' + h(JSON.stringify(data.details, null, 2)) + '</pre>' : ''}`;
    return;
  }

  const rangeBtn = (val, label) => `<button onclick="analyticsRange='${val}';renderAnalytics(document.getElementById('content'))" class="filter-tab ${analyticsRange === val ? 'active' : ''}">${label}</button>`;

  // Bar chart with adaptive sizing
  const dates = data.byDate || [];
  const maxCount = Math.max(...dates.map(d => d.count), 1);
  const numBars = dates.length;

  let barsHtml = '';
  if (numBars === 0) {
    barsHtml = `<div class="flex items-center justify-center h-full w-full">
      <div class="text-center">
        <svg class="w-12 h-12 mx-auto text-sage-200 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        <p class="text-gray-400 text-xs">No data for this period</p>
      </div>
    </div>`;
  } else {
    // Adaptive: wider bars for few data points, thinner for many
    const barGap = numBars <= 7 ? '6px' : numBars <= 14 ? '3px' : '2px';
    const minBarWidth = numBars <= 7 ? '36px' : numBars <= 14 ? '20px' : '8px';
    // Label skip: show every Nth label to avoid overlap
    const labelSkip = numBars <= 7 ? 1 : numBars <= 14 ? 2 : numBars <= 21 ? 3 : Math.ceil(numBars / 8);

    barsHtml = `<div class="flex items-end justify-center w-full h-full" style="gap:${barGap}">`;
    dates.forEach((d, i) => {
      const heightPct = Math.max((d.count / maxCount) * 100, 4); // min 4% so 0-count bars visible
      const heightPx = Math.max(Math.round(heightPct * 1.2), 4);
      // d.date is UTC date like "2026-06-23" — parse at noon local to avoid day shift
      const label = new Date(d.date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const isToday = d.date === new Date().toLocaleDateString('en-CA'); // en-CA gives YYYY-MM-DD
      const showLabel = (i % labelSkip === 0) || i === numBars - 1;
      barsHtml += `<div class="chart-bar flex flex-col items-center gap-1 relative" style="flex:1;min-width:${minBarWidth};max-width:60px">
        <div class="chart-bar-tooltip">${d.count} view${d.count!==1?'s':''}</div>
        <div class="w-full rounded-t-md" style="height:${heightPx}px;background:linear-gradient(to top,#48543e,#93a27e)"></div>
        ${showLabel ? `<span class="text-[9px] ${isToday ? 'text-sage-700 font-bold' : 'text-gray-400'} truncate w-full text-center leading-tight">${label}</span>` : '<span class="text-[9px] invisible">.</span>'}
      </div>`;
    });
    barsHtml += '</div>';
  }

  // Table builder
  const table = (rows) => rows.length === 0 ? '<p class="text-gray-400 text-xs">No data yet</p>' :
    rows.map((r, i) => {
      const pct = Math.round((r.count / data.totalViews) * 100);
      return `<div class="flex items-center gap-3 py-1.5">
        <span class="text-xs text-gray-400 w-4">${i + 1}</span>
        <div class="flex-1 min-w-0">
          <div class="flex justify-between mb-0.5"><span class="text-xs text-gray-700 truncate">${h(r.name)}</span><span class="text-xs text-gray-400">${r.count}</span></div>
          <div class="w-full bg-gray-100 rounded-full h-1"><div class="bg-sage-500 h-1 rounded-full" style="width:${pct}%"></div></div>
        </div>
      </div>`;
    }).join('');

  el.innerHTML = `<div class="flex items-center justify-between mb-6 flex-wrap gap-3">
    <h1 class="text-2xl font-display font-bold text-sage-800">Analytics</h1>
    <div class="flex gap-2">${rangeBtn('24h', '24h')}${rangeBtn('7d', '7 days')}${rangeBtn('30d', '30 days')}</div>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5">
    <div class="card p-4 text-center">
      <p class="text-2xl font-bold text-sage-700">${data.totalViews.toLocaleString()}</p>
      <p class="text-gray-400 text-xs mt-0.5">Page Views</p>
    </div>
    <div class="card p-4 text-center">
      <p class="text-2xl font-bold text-sage-700">${data.totalVisits.toLocaleString()}</p>
      <p class="text-gray-400 text-xs mt-0.5">Visits</p>
    </div>
    <div class="card p-4 text-center">
      <p class="text-2xl font-bold text-sage-700">${data.topPages.length}</p>
      <p class="text-gray-400 text-xs mt-0.5">Pages Hit</p>
    </div>
    <div class="card p-4 text-center">
      <p class="text-2xl font-bold text-sage-700">${data.topCountries.length}</p>
      <p class="text-gray-400 text-xs mt-0.5">Countries</p>
    </div>
  </div>

  <div class="card p-6 mb-5">
    <h3 class="font-bold text-gray-900 text-sm mb-4">Page Views Over Time</h3>
    <div style="height:140px">${barsHtml}</div>
  </div>

  <div class="grid md:grid-cols-2 gap-5 mb-5">
    <div class="card p-6">
      <h3 class="font-bold text-gray-900 text-sm mb-3">Top Pages</h3>
      ${table(data.topPages)}
    </div>
    <div class="card p-6">
      <h3 class="font-bold text-gray-900 text-sm mb-3">Referrers</h3>
      ${table(data.topReferrers)}
    </div>
  </div>

  <div class="grid md:grid-cols-2 gap-5 mb-5">
    <div class="card p-6">
      <h3 class="font-bold text-gray-900 text-sm mb-3">Countries</h3>
      ${table(data.topCountries)}
    </div>
    <div class="card p-6">
      <h3 class="font-bold text-gray-900 text-sm mb-3">Browsers</h3>
      ${table(data.topBrowsers)}
    </div>
  </div>

  <div class="grid md:grid-cols-2 gap-5">
    <div class="card p-6">
      <h3 class="font-bold text-gray-900 text-sm mb-3">Operating Systems</h3>
      ${table(data.topOS || [])}
    </div>
    <div class="card p-6">
      <h3 class="font-bold text-gray-900 text-sm mb-3">Devices</h3>
      ${table(data.devices)}
    </div>
  </div>

  <p class="text-xs text-gray-400 mt-4 text-center">Powered by Cloudflare Web Analytics &bull; UTC: ${new Date().toLocaleString('en-US', { timeZone: 'UTC', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true })}</p>`;
}

  };

  // Fetch sync status for the header indicator
  let syncHtml = '';
  try {
    const syncData = await api('/admin/sync-status');
    const lastMin = syncData.last_success ? minutesAgo(syncData.last_success) : null;
    const isOk = lastMin !== null && lastMin < 30;
    const dot = isOk ? 'bg-green-500' : 'bg-amber-500';
    const label = lastMin !== null ? (lastMin < 1 ? 'synced just now' : 'synced ' + lastMin + 'm ago') : 'no sync data';
    syncHtml = `<div class="flex items-center gap-2 text-xs text-gray-400">
      <span class="w-2 h-2 rounded-full ${dot}"></span>
      <span>${label}</span>
      <a href="https://github.com/WCAHS/wcahs-demo/actions" target="_blank" class="text-sage-600 hover:underline ml-1">GitHub</a>
    </div>`;
  } catch(e) {}

  el.innerHTML = `<div class="flex items-center justify-between mb-5 flex-wrap gap-3">
    <h1 class="text-2xl font-display font-bold text-sage-800">Pets</h1>
    ${syncHtml}
  </div>
  <div class="filter-tabs-scroll mb-5">
    ${tabBtn('active', 'Active')}
    ${tabBtn('inactive', 'Inactive')}
    ${tabBtn('happy-tails', 'Happy Tails')}
    ${tabBtn('manage', 'Add Pet')}
  </div>
  <div id="petsContent"><p class="text-gray-400">Loading...</p></div>`;

  switch (_petsTab) {
    case 'active': await renderPetsActive(); break;
    case 'inactive': await renderPetsInactive(); break;
    case 'happy-tails': await renderPetsHappyTails(); break;
    case 'manage': await renderPetsManage(); break;
  }
}

    ? `<img src="${h(photoUrl)}" class="w-full h-36 object-cover rounded-t-2xl" onerror="this.style.display='none'">`

  const statusColor = isHidden ? 'bg-gray-100 text-gray-500'
    : isInactive ? 'bg-amber-50 text-amber-700'

  let actions = '';
  if (showActions) {

async function uploadPhotoFile(fileInput) {
  const file = fileInput.files[0];
  if (!file) return '';
  const formData = new FormData();
  formData.append('photo', file);
  const res = await fetch('/api/admin/pets/photo', {
    method: 'POST',
    body: formData,
  });
  const data = await res.json();
  return data.url || '';
}

window.saveHappyTail = async function() {
  const name = document.getElementById('htName').value.trim();
  if (!name) { alert('Pet name is required'); return; }

  let photoUrl = '';
  let familyPhotoUrl = '';
  const photoInput = document.getElementById('htPhoto');
  const familyInput = document.getElementById('htFamilyPhoto');
  if (photoInput.files[0]) photoUrl = await uploadPhotoFile(photoInput);
  if (familyInput.files[0]) familyPhotoUrl = await uploadPhotoFile(familyInput);

  const res = await api('/admin/pets/happy-tails', { method: 'POST', body: {
    pet_name: name,
    pet_type: document.getElementById('htType').value,
    breed: document.getElementById('htBreed').value,
    adoption_date: document.getElementById('htDate').value,
    description: document.getElementById('htDesc').value,
    photo_url: photoUrl,
    family_photo_url: familyPhotoUrl,
  }});
  if (res.error) { alert(res.error); return; }
  _petsTab = 'happy-tails';
  renderPets(document.getElementById('content'));
};

window.removeHappyTail = async function(id) {
  await api('/admin/pets/happy-tails?id=' + id, { method: 'DELETE' });
  _petsTab = 'happy-tails';
  renderPets(document.getElementById('content'));
};

window.uploadHappyTailPhoto = async function(id) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async function() {
    if (!input.files[0]) return;
    const url = await uploadPhotoFile(input);
    if (!url) { alert('Upload failed'); return; }
    // Fetch current entry, update family_photo_url via raw SQL through happy-tails endpoint
    // We need a PUT-like operation. For simplicity, delete and re-add is bad. Let's use a separate approach.
    // Actually, we can just update via a POST with special flag or use the existing endpoints.
    // The happy-tails endpoint only has GET/POST/DELETE. Let's do a direct fetch to update.
    const res = await fetch('/api/admin/pets/happy-tails', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ _update_photo: true, id, family_photo_url: url }),
    });
    _petsTab = 'happy-tails';
    renderPets(document.getElementById('content'));
  };
  input.click();
};

window.changeMyPassword = async function() {
  const current = document.getElementById('cpCurrent').value;
  const newPass = document.getElementById('cpNew').value;
  const confirm = document.getElementById('cpConfirm').value;
  const status = document.getElementById('cpStatus');

  if (!current || !newPass) { status.className = 'text-sm text-red-600'; status.textContent = 'All fields required'; status.classList.remove('hidden'); return; }
  if (newPass !== confirm) { status.className = 'text-sm text-red-600'; status.textContent = 'New passwords don\'t match'; status.classList.remove('hidden'); return; }

  const res = await api('/admin/change-password', { method: 'POST', body: { current_password: current, new_password: newPass } });
  if (res.ok) {
    status.className = 'text-sm text-sage-700'; status.textContent = res.message || 'Password changed!';
    document.getElementById('cpCurrent').value = '';
    document.getElementById('cpNew').value = '';
    document.getElementById('cpConfirm').value = '';
  } else {
    status.className = 'text-sm text-red-600'; status.textContent = res.error || 'Failed';
  }
  status.classList.remove('hidden');
};

    const isAdmin = u.role === 'admin';
    const dotColor = isAdmin ? 'bg-sage-500' : 'bg-blue-500';
    html += `<div class="card p-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="w-2 h-2 rounded-full ${dotColor} shrink-0"></span>
        <div>
          <span class="font-bold text-gray-900 text-sm">${h(u.username)}</span>
          <span class="text-xs text-gray-400 ml-2 capitalize">${u.role}</span>
          <span class="text-xs text-gray-300 ml-2">Created ${new Date(u.created_at).toLocaleDateString()}</span>
        </div>
      </div>
      <div class="flex gap-3">
        <button onclick="resetUserPassword(${u.id}, '${h(u.username)}')" class="text-xs text-sage-700 hover:underline font-semibold">Reset password</button>
        <button onclick="if(confirm('Delete user ${h(u.username)}?')) deleteUser(${u.id})" class="text-xs text-red-400 hover:underline">Delete</button>
      </div>
    </div>`;
  });
  html += '</div>';
  html += `<div class="mt-6 card p-5 text-sm text-gray-500">
    <strong class="text-gray-700">Roles</strong><br>
    <span class="inline-flex items-center gap-1.5 mt-1"><span class="w-2 h-2 rounded-full bg-sage-500"></span> <strong>Admin</strong></span> &mdash; full access to everything<br>
    <span class="inline-flex items-center gap-1.5 mt-1"><span class="w-2 h-2 rounded-full bg-blue-500"></span> <strong>Staff</strong></span> &mdash; Inbox and Events only
  </div>`;
  el.innerHTML = html;
}

window.showUserForm = function() {
  document.getElementById('userFormArea').innerHTML = `<div class="card-warm p-6 mb-5 border border-sage-200" style="background:#f6f7f4;">
    <h3 class="font-bold text-gray-900 mb-4">New User</h3>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
      <div><label class="block text-xs font-semibold text-gray-600 mb-1">Username *</label><input id="nuUser" class="w-full border border-sage-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-sage-400"></div>
      <div><label class="block text-xs font-semibold text-gray-600 mb-1">Password * (min 8 chars)</label><input id="nuPass" type="password" class="w-full border border-sage-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-sage-400"></div>
      <div><label class="block text-xs font-semibold text-gray-600 mb-1">Role *</label>
        <select id="nuRole" class="w-full border border-sage-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-sage-400">
          <option value="staff">Staff</option>
          <option value="admin">Admin</option>
        </select></div>
    </div>
    <div class="flex gap-2">
      <button onclick="createUser()" class="bg-sage-700 hover:bg-sage-800 text-white font-semibold text-sm px-5 py-2.5 rounded-xl transition">Create User</button>
      <button onclick="document.getElementById('userFormArea').innerHTML=''" class="text-gray-500 text-sm px-4 py-2.5 hover:text-gray-700 transition">Cancel</button>
    </div>
  </div>`;
};

window.createUser = async function() {
  const username = document.getElementById('nuUser').value;
  const password = document.getElementById('nuPass').value;
  const role = document.getElementById('nuRole').value;
  if (!username || !password) { alert('Username and password required'); return; }
  const res = await api('/admin/users', { method: 'POST', body: { username, password, role } });
  if (res.ok) { navigate('users'); }
  else { alert(res.error || 'Failed to create user'); }
};

window.resetUserPassword = async function(id, username) {
  const newPass = prompt('New password for ' + username + ' (min 8 characters):');
  if (!newPass) return;
  const res = await api('/admin/users/' + id, { method: 'PUT', body: { password: newPass } });
  if (res.ok) { alert('Password reset for ' + username); }
  else { alert(res.error || 'Failed to reset password'); }
};

window.deleteUser = async function(id) {
  const res = await api('/admin/users/' + id, { method: 'DELETE' });
  if (res.ok) { navigate('users'); }
  else { alert(res.error || 'Failed to delete user'); }
};

// ── Init ──
checkAuth();
</script>
</body>
</html>
