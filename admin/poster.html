<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poster — WCAHS</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#48543e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Nunito',sans-serif;background:#e8e8e8;color:#333;overflow:hidden;height:100vh}

    /* ── Action Bar ── */
    .bar{position:sticky;top:0;z-index:100;background:#1e1e1e;display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:2px solid #48543e;height:44px;flex-wrap:nowrap}
    .bar-back{color:#aaa;font-size:18px;text-decoration:none;padding:4px 8px;border-radius:4px;line-height:1}
    .bar-back:hover{color:#fff;background:#333}
    .bar-spacer{flex:1}
    .bar-btn{background:none;border:none;color:#aaa;font:700 11px 'Nunito',sans-serif;padding:6px 10px;cursor:pointer;border-radius:6px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
    .bar-btn:hover{color:#fff;background:#333}
    .bar-btn.primary{background:#48543e;color:#fff}
    .bar-btn.primary:hover{background:#5c6b4e}
    .bar-btn:disabled{opacity:.4;pointer-events:none}
    .bar-divider{width:1px;height:20px;background:#444}

    /* ── Layout ── */
    .layout{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 44px)}
    @media(max-width:800px){
      .layout{grid-template-columns:1fr;grid-template-rows:auto 1fr}
    }

    /* ── Editor ── */
    .editor{background:#fff;border-right:1px solid #ddd;overflow-y:auto;padding:12px 14px 20px}
    .editor-toggle{display:none;background:#f5f5f5;border:none;width:100%;padding:10px;font:700 13px 'Nunito',sans-serif;color:#48543e;cursor:pointer;border-bottom:1px solid #ddd}
    @media(max-width:800px){
      .editor-toggle{display:block}
      .editor-body.collapsed{display:none}
    }
    .type-pills{display:flex;gap:0;border-radius:6px;overflow:hidden;border:2px solid #ddd;margin-bottom:10px}
    .type-pill{flex:1;padding:7px;border:none;font:800 14px/1 'Nunito',sans-serif;cursor:pointer;text-transform:uppercase;letter-spacing:2px;background:#f5f5f5;color:#aaa;transition:all .15s}
    .type-pill.lost-on{background:#cc1f1f;color:#fff}
    .type-pill.found-on{background:#2d7a3a;color:#fff}
    .sec{font-size:10px;font-weight:800;color:#48543e;text-transform:uppercase;letter-spacing:1px;margin:10px 0 4px;padding-bottom:2px;border-bottom:1.5px solid #e8ece4}
    .f{margin-bottom:6px}
    .f label{display:block;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.3px;margin-bottom:1px}
    .f input,.f textarea,.f select{width:100%;padding:5px 8px;border:1.5px solid #ddd;border-radius:5px;font:600 13px/1.4 'Nunito',sans-serif;color:#333;background:#fafafa}
    .f input:focus,.f textarea:focus,.f select:focus{outline:none;border-color:#48543e;background:#fff}
    .f textarea{resize:vertical}
    .f .req{color:#cc1f1f;font-size:9px;margin-left:2px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
    .thumbs{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
    .thumbs img{width:52px;height:52px;border-radius:6px;object-fit:cover;border:2px solid #ddd;cursor:pointer}
    .thumbs img.on{border-color:#48543e;box-shadow:0 0 0 2px #48543e}
    .mc-row{display:flex;align-items:center;gap:8px}
    .mc-pills{display:flex;border-radius:5px;overflow:hidden;border:1.5px solid #ddd}
    .mc-pill{padding:3px 10px;border:none;font:700 11px 'Nunito',sans-serif;cursor:pointer;background:#f5f5f5;color:#aaa;transition:all .15s}
    .mc-pill.on{background:#48543e;color:#fff}

    /* ── Preview Wrap ── */
    .preview-wrap{background:#e0e0e0;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:20px}
    .preview-scaler{transform-origin:top center}

    /* ── POSTER (Fixed 8.5x11) ── */
    .poster{width:8.5in;height:11in;background:#fff;font-family:'Nunito',sans-serif;overflow:hidden;box-shadow:0 2px 20px rgba(0,0,0,.12);display:flex;flex-direction:column}
    .p-head{padding:16px 32px 12px;text-align:center;color:#fff}
    .p-head.lost{background:#cc1f1f}
    .p-head.found{background:#2d7a3a}
    .p-head h1{font-size:52px;font-weight:900;letter-spacing:8px;line-height:1;text-transform:uppercase}
    .p-head .sub{font-size:15px;font-weight:700;opacity:.9;letter-spacing:.5px;margin-top:2px}
    .p-body{flex:1;display:flex;flex-direction:column;justify-content:center;overflow:hidden;padding:8px 0}
    .p-photo{text-align:center;padding:0 32px;margin-bottom:8px}
    .p-photo img{max-width:100%;height:3.8in;border-radius:10px;border:3px solid #333;object-fit:cover;display:block;margin:0 auto}
    .p-photo .none{height:2.5in;background:#f3f3f3;border:2px dashed #ccc;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#999;font-size:16px;font-weight:600}
    .p-name{text-align:center;padding:4px 32px 2px;font-size:40px;font-weight:900;color:#111;line-height:1.1}
    .p-name .responds{display:block;font-size:13px;font-weight:600;color:#666;margin-top:1px}
    .p-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px 14px;padding:6px 32px}
    .p-grid .dl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:#555}
    .p-grid .dv{font-size:15px;font-weight:700;color:#111}
    .p-grid .empty{font-size:14px;font-weight:700;color:#ddd}
    .p-details{padding:4px 32px;display:flex;flex-direction:column;gap:6px}
    .p-desc{font-size:13px;color:#333;line-height:1.4;border-left:3px solid #ddd;padding:4px 0 4px 12px;max-height:1.2in;overflow:hidden}
    .p-loc{padding:10px 16px;border-radius:8px;text-align:center;font-weight:700;font-size:16px}
    .p-loc.lost{background:#fef9e7;color:#92660e;border:1.5px solid #f5d67a}
    .p-loc.found{background:#eef8f0;color:#1e6a31;border:1.5px solid #8cd4a0}
    .p-loc .ll{font-size:9px;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:1px;opacity:.7}
    .p-loc .ld{font-size:11px;font-weight:600;opacity:.7;margin-top:2px}
    .p-contact{margin:6px 32px;padding:14px 18px;border-radius:10px;background:#1a56a0;color:#fff;text-align:center}
    .p-contact .phone{font-size:34px;font-weight:900;letter-spacing:1px}
    .p-contact .cname{font-size:14px;font-weight:600;opacity:.9;margin-top:2px}
    .p-foot{padding:6px 32px 8px;text-align:center;border-top:1.5px solid #e8ece4;background:#f5f7f3;margin-top:auto}
    .p-foot .org{font-weight:800;color:#48543e;font-size:11px;letter-spacing:.3px}

    /* ── Print ── */
    @media print{
      *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
      body{background:#fff!important;overflow:visible!important;height:auto!important}
      .bar,.editor{display:none!important}
      .layout{display:block!important;height:auto!important}
      .preview-wrap{background:#fff!important;padding:0!important;overflow:visible!important}
      .preview-scaler{transform:none!important}
      .poster{box-shadow:none!important;width:100%!important;height:100vh!important;margin:0!important;page-break-inside:avoid}
      @page{size:letter;margin:.2in}
    }

    /* ── Toast / Overlay ── */
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:8px 20px;border-radius:6px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
    .toast.show{opacity:1}
    .saving{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:9999}
    .saving.show{display:flex}
    .saving div{background:#fff;padding:20px 36px;border-radius:10px;font-size:15px;font-weight:700}

    /* ── Publish modal ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
    .modal{background:#fff;border-radius:16px;max-width:400px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.2);overflow:hidden}
    .modal-head{padding:16px 20px;border-bottom:1px solid #e8ece4}
    .modal-head h3{font-size:16px;font-weight:800;color:#333}
    .modal-body{padding:20px}
    .modal-foot{padding:12px 20px;border-top:1px solid #e8ece4;display:flex;justify-content:flex-end;gap:8px}
    .modal-btn{padding:8px 18px;border:none;border-radius:8px;font:700 13px 'Nunito',sans-serif;cursor:pointer;transition:all .15s}
    .modal-btn.cancel{background:#f5f5f5;color:#666}
    .modal-btn.cancel:hover{background:#e5e5e5}
    .modal-btn.confirm{background:#48543e;color:#fff}
    .modal-btn.confirm:hover{background:#5c6b4e}
  </style>
</head>
<body>

<!-- Action Bar -->
<div class="bar">
  <a href="/admin/" class="bar-back" title="Back to Admin">&#8592;</a>
  <div class="bar-spacer"></div>
  <button class="bar-btn primary" id="saveBtn" onclick="doSave()">&#128190; Save Poster</button>
  <div class="bar-divider"></div>
  <button class="bar-btn" id="printBtn" onclick="doPrint()" disabled>&#128424; Print</button>
  <button class="bar-btn" id="emailBtn" onclick="doEmail()" disabled>&#9993; Email</button>
  <button class="bar-btn" id="shareBtn" onclick="doShare()" disabled>&#128266; Share</button>
  <div class="bar-divider"></div>
  <button class="bar-btn" id="publishBtn" onclick="doPublish()" disabled>&#10004; Post to Website</button>
</div>

<div class="layout">
  <!-- Editor -->
  <div class="editor">
    <button class="editor-toggle" id="ed-toggle">Edit Fields &#9660;</button>
    <div class="editor-body" id="ed-body">
      <div class="type-pills">
        <button class="type-pill" data-t="lost" onclick="setType('lost')">Lost</button>
        <button class="type-pill" data-t="found" onclick="setType('found')">Found</button>
      </div>

      <div class="sec">Pet Info</div>
      <div class="f"><label>Pet Name <span class="req">*</span></label><input id="f-name" oninput="up()" placeholder="Required"></div>
      <div class="f"><label>Breed Line <span class="req">*</span></label><input id="f-breed" placeholder="e.g. Yellow Lab, Male, 4 yrs" oninput="up()"></div>
      <div class="f"><label>Color</label><input id="f-color" oninput="up()"></div>
      <div class="row3">
        <div class="f"><label>Collar</label><input id="f-collar" placeholder="Red w/ tags" oninput="up()"></div>
        <div class="f"><label>Microchipped</label>
          <div class="mc-pills" style="margin-top:2px">
            <button class="mc-pill" data-v="yes" onclick="setMC('yes')">Yes</button>
            <button class="mc-pill" data-v="no" onclick="setMC('no')">No</button>
            <button class="mc-pill on" data-v="" onclick="setMC('')">Unk</button>
          </div></div>
        <div class="f"><label>Weight</label><input id="f-weight" placeholder="~70 lbs" oninput="up()"></div>
      </div>
      <div class="f"><label>Description</label><textarea id="f-desc" rows="3" oninput="up()" placeholder="Identifying marks, size, temperament..."></textarea></div>

      <div class="sec">Location</div>
      <div class="f"><label>Location <span class="req">*</span></label><textarea id="f-loc" rows="2" oninput="up()" placeholder="Required — cross streets, landmarks"></textarea></div>
      <div class="f"><label>Date</label><input id="f-date" type="date" oninput="up()"></div>

      <div class="sec">Contact</div>
      <div class="row2">
        <div class="f"><label>Name</label><input id="f-cname" oninput="up()"></div>
        <div class="f"><label>Phone <span class="req">*</span></label><input id="f-phone" type="tel" oninput="up()"></div>
      </div>

      <div class="sec">Photo</div>
      <div id="photo-area"><span style="font-size:11px;color:#999">No photos</span></div>
    </div>
  </div>

  <!-- Preview -->
  <div class="preview-wrap" id="pw">
    <div class="preview-scaler" id="ps"><div id="pc"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="saving" id="saving"><div>Generating image...</div></div>

<script>
const $ = id => document.getElementById(id);

// State
let S = { type:'lost', name:'', breed:'', color:'', weight:'', collar:'', mc:'', desc:'', loc:'', date:'', cname:'', phone:'', rid:'', photos:[], pi:0, reporterEmail:'', saved: false, savedImageUrl: '' };

// Load from sessionStorage
(function load() {
  const raw = sessionStorage.getItem('wcahs_poster_data');
  if (!raw) return;
  try {
    const d = JSON.parse(raw);
    S.type = d.type || 'lost';
    S.name = d.pet_name || '';
    S.color = d.color || '';
    S.weight = d.weight || '';
    S.collar = d.collar_details || d.collar_status || '';
    S.mc = d.microchipped || '';
    S.desc = d.description || '';
    S.loc = d.location_details || '';
    S.cname = d.reporter_name || '';
    S.phone = d.reporter_phone || '';
    S.reporterEmail = d.reporter_email || '';
    S.rid = d.id || d.report_id || '';
    const parts = [d.breed, d.gender, d.age].filter(Boolean);
    S.breed = parts.join(', ') || (d.species || '');
    if (!S.breed && d.species) S.breed = d.species;
    if (d.created_at) try { S.date = d.created_at.split('T')[0]; } catch(e){}
    let photos = [];
    if (d.photo_url) {
      try { photos = JSON.parse(d.photo_url); } catch(e) { photos = [d.photo_url]; }
      if (!Array.isArray(photos)) photos = [photos];
      photos = photos.filter(p => p && typeof p === 'string');
    }
    S.photos = photos;
  } catch(e){}
})();

// Populate editor
function populate() {
  $('f-name').value = S.name;
  $('f-breed').value = S.breed;
  $('f-color').value = S.color;
  $('f-weight').value = S.weight;
  $('f-collar').value = S.collar;
  $('f-desc').value = S.desc;
  $('f-loc').value = S.loc;
  $('f-date').value = S.date;
  $('f-cname').value = S.cname;
  $('f-phone').value = S.phone;
  syncType(); syncMC(); renderThumbs();
}

function syncType() {
  document.querySelectorAll('.type-pill').forEach(b => {
    b.classList.remove('lost-on','found-on');
    if (b.dataset.t === S.type) b.classList.add(S.type + '-on');
  });
}
function setType(t) { S.type = t; S.saved = false; syncType(); up(); updateBarState(); }

function syncMC() {
  document.querySelectorAll('.mc-pill').forEach(b => b.classList.toggle('on', b.dataset.v === S.mc));
}
function setMC(v) { S.mc = v; S.saved = false; syncMC(); up(); updateBarState(); }

function renderThumbs() {
  const el = $('photo-area');
  if (!S.photos.length) { el.innerHTML = '<span style="font-size:11px;color:#999">No photos</span>'; return; }
  el.innerHTML = '<div class="thumbs">' + S.photos.map((u,i) =>
    '<img src="'+esc(u)+'" class="'+(i===S.pi?'on':'')+'" onclick="selPhoto('+i+')" onerror="this.style.display=\'none\'">'
  ).join('') + '</div>';
}
function selPhoto(i) { S.pi = i; renderThumbs(); up(); }

function read() {
  S.name = $('f-name').value;
  S.breed = $('f-breed').value;
  S.color = $('f-color').value;
  S.weight = $('f-weight').value;
  S.collar = $('f-collar').value;
  S.desc = $('f-desc').value;
  S.loc = $('f-loc').value;
  S.date = $('f-date').value;
  S.cname = $('f-cname').value;
  S.phone = $('f-phone').value;
  S.saved = false;
  updateBarState();
}

function up() { read(); render(); }

function updateBarState() {
  const hasRequired = S.name && S.breed && S.loc && S.phone;
  $('saveBtn').disabled = !hasRequired;
  $('printBtn').disabled = !S.saved;
  $('emailBtn').disabled = !S.saved;
  $('shareBtn').disabled = !S.saved;
  $('publishBtn').disabled = !S.saved;
  if (S.saved) {
    $('saveBtn').innerHTML = '&#9998; Edit Poster';
    $('saveBtn').disabled = false;
  } else {
    $('saveBtn').innerHTML = '&#128190; Save Poster';
  }
}

// Mobile editor toggle
$('ed-toggle').addEventListener('click', () => {
  const body = $('ed-body');
  const collapsed = body.classList.toggle('collapsed');
  $('ed-toggle').innerHTML = collapsed ? 'Edit Fields &#9654;' : 'Edit Fields &#9660;';
});

function render() {
  $('pc').innerHTML = renderPoster();
  scale();
}

function renderPoster() {
  const lost = S.type === 'lost', tc = lost ? 'lost' : 'found';
  const headline = lost ? 'MISSING' : 'FOUND';
  const sub = lost ? 'Please help bring me home' : 'Is this your pet?';
  const photo = S.photos[S.pi] || '';
  const phone = fmtPhone(S.phone) || '(507) 201-7287';
  const who = S.cname || 'WCAHS';

  // Build detail grid — always show all fields, placeholder if empty
  let grid = '';
  const add = (l,v) => {
    grid += '<div><div class="dl">'+l+'</div>' + (v ? '<div class="dv">'+esc(v)+'</div>' : '<div class="empty">&mdash;</div>') + '</div>';
  };
  add('Breed', S.breed);
  add('Color', S.color);
  add('Weight', S.weight);
  add('Collar', S.collar);
  if (S.mc === 'yes') add('Microchip', 'Yes');
  else if (S.mc === 'no') add('Microchip', 'No');
  else add('Microchip', '');

  const locLabel = lost ? 'Last Seen Near' : 'Found At';
  const dateStr = S.date ? fmtDate(S.date) : '';

  return '<div class="poster" id="poster">'+
    '<div class="p-head '+tc+'"><h1>'+headline+'</h1><div class="sub">'+esc(sub)+'</div></div>'+
    '<div class="p-body">'+
    '<div class="p-photo">'+(photo ? '<img src="'+esc(photo)+'" crossorigin="anonymous" alt="">' : '<div class="none">No Photo Available</div>')+'</div>'+
    '<div class="p-name">'+(S.name ? esc(S.name) : '<span style="color:#ccc;font-style:italic">Pet Name</span>')+(S.name && lost?'<span class="responds">Responds to "'+esc(S.name)+'"</span>':'')+'</div>'+
    '<div class="p-grid">'+grid+'</div>'+
    '<div class="p-details">'+
      '<div class="p-desc">'+(S.desc ? esc(S.desc) : '<span style="color:#ccc;font-style:italic">Description and identifying details will appear here...</span>')+'</div>'+
      '<div class="p-loc '+tc+'"><span class="ll">'+esc(locLabel)+'</span>'+(S.loc ? esc(S.loc) : '<span style="color:inherit;opacity:.5;font-style:italic">Location</span>')+(dateStr?'<div class="ld">'+esc(dateStr)+'</div>':'')+'</div>'+
    '</div>'+
    '<div class="p-contact"><div class="phone">'+esc(phone)+'</div><div class="cname">Contact: '+esc(who)+'</div></div>'+
    '<div class="p-foot"><div class="org">Waseca County Animal Humane Society &middot; (507) 201-7287 &middot; wcahs.org</div></div>'+
    '</div></div>';
}

// Scale preview to fit
function scale() {
  const wrap = $('pw'), scaler = $('ps');
  scaler.style.transform = 'none';
  requestAnimationFrame(() => {
    const poster = $('poster');
    if (!poster) return;
    const wW = wrap.clientWidth - 40, wH = wrap.clientHeight - 40;
    const pW = poster.offsetWidth, pH = poster.offsetHeight;
    if (!pW || !pH) return;
    const s = Math.min(wW/pW, wH/pH, 1);
    scaler.style.transform = 'scale('+s+')';
  });
}

// ── Actions ──

async function doSave() {
  if (S.saved) {
    // Already saved — toggle back to edit mode
    S.saved = false;
    S.savedImageUrl = '';
    updateBarState();
    toast('Editing poster');
    return;
  }
  const poster = $('poster');
  if (!poster) return;
  $('saving').classList.add('show');
  $('saveBtn').disabled = true;
  $('saveBtn').innerHTML = 'Saving...';
  try {
    const canvas = await html2canvas(poster, { useCORS:true, allowTaint:true, scale:2, backgroundColor:'#fff' });
    // Upload to R2
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    const formData = new FormData();
    formData.append('poster', blob, 'poster.png');
    const res = await fetch('/api/admin/poster/save', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.ok && data.url) {
      S.saved = true;
      S.savedImageUrl = data.url;
      updateBarState();
      toast('Poster saved!');
    } else {
      toast(data.error || 'Save failed');
      $('saveBtn').disabled = false;
      $('saveBtn').innerHTML = '&#128190; Save Poster';
    }
  } catch(e) {
    toast('Error saving poster');
    console.error(e);
    $('saveBtn').disabled = false;
    $('saveBtn').innerHTML = '&#128190; Save Poster';
  }
  $('saving').classList.remove('show');
}

function doPrint() {
  setTimeout(() => window.print(), 100);
}

async function doEmail() {
  const email = prompt('Send poster to:', S.reporterEmail || '');
  if (!email) return;
  toast('Sending...');
  try {
    const res = await fetch('/api/admin/poster/email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        to: email,
        type: S.type,
        pet_name: S.name,
        poster_url: S.savedImageUrl,
      }),
    });
    const data = await res.json();
    if (data.ok) toast('Email sent to ' + email);
    else toast(data.error || 'Send failed');
  } catch(e) {
    toast('Error sending email');
  }
}

function doShare() {
  if (navigator.share) {
    navigator.share({
      title: (S.type === 'lost' ? 'LOST' : 'FOUND') + ': ' + (S.name || 'Pet'),
      text: generatePlainText(),
      url: 'https://wcahs.org/lost-found.html',
    }).catch(() => {});
  } else {
    // Fallback: open Facebook share
    const text = encodeURIComponent(generatePlainText());
    window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent('https://wcahs.org/lost-found.html') + '&quote=' + text, '_blank', 'width=600,height=400');
  }
}

function doPublish() {
  if (!S.rid) { toast('No report ID — cannot publish'); return; }
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `<div class="modal">
    <div class="modal-head"><h3>Post to Lost & Found?</h3></div>
    <div class="modal-body">
      <p style="font-size:13px;color:#666;line-height:1.5">This will approve the report and post it on the Lost & Found page with the details from this poster.</p>
    </div>
    <div class="modal-foot">
      <button class="modal-btn cancel" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="modal-btn confirm" onclick="confirmPublish(this)">Post to Website</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

async function confirmPublish(btn) {
  btn.disabled = true;
  btn.textContent = 'Publishing...';
  try {
    // Update the report with edited details and approve
    await fetch('/api/admin/lost-found/' + S.rid, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        status: 'approved',
        pet_name: S.name,
        breed: S.breed,
        color: S.color,
        description: S.desc,
        location_details: S.loc,
      }),
    });
    toast('Posted to Lost & Found!');
    btn.closest('.modal-overlay').remove();
    $('publishBtn').innerHTML = '&#10004; Published';
    $('publishBtn').disabled = true;
  } catch(e) {
    toast('Error publishing');
    btn.disabled = false;
    btn.textContent = 'Post to Website';
  }
}

function generatePlainText() {
  const lost = S.type === 'lost';
  const tag = lost ? 'LOST' : 'FOUND';
  const phone = fmtPhone(S.phone) || '(507) 201-7287';
  const who = S.cname || 'WCAHS';
  let l = [];
  l.push('\u{1F6A8} ' + tag + ' ' + (S.breed.split(',')[0] || 'PET').toUpperCase() + ' \u2014 ' + (S.name || 'UNKNOWN').toUpperCase());
  if (S.breed) l.push(S.breed);
  const d = [];
  if (S.color) d.push('Color: ' + S.color);
  if (S.weight) d.push('Weight: ' + S.weight);
  if (S.collar) d.push('Collar: ' + S.collar);
  if (d.length) l.push(d.join(' | '));
  if (S.loc) l.push((lost ? 'Last seen: ' : 'Found at: ') + S.loc + (S.date ? ', ' + fmtDate(S.date) : ''));
  if (S.desc) l.push('Description: ' + S.desc);
  l.push('Contact: ' + who + (S.phone ? ' ' + phone : ''));
  l.push('#' + tag + 'Dog #Waseca #WCAHS #LostPet');
  return l.join('\n');
}

// Utilities
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmtPhone(p){if(!p)return '';const d=p.replace(/\D/g,'');if(d.length===10)return '('+d.slice(0,3)+') '+d.slice(3,6)+'-'+d.slice(6);if(d.length===11&&d[0]==='1')return '('+d.slice(1,4)+') '+d.slice(4,7)+'-'+d.slice(7);return p}
function fmtDate(d){if(!d)return '';try{return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}catch(e){return d}}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

// Init
populate();
up();
updateBarState();
window.addEventListener('resize', scale);
</script>
</body>
