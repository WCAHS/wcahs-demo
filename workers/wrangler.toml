name = "wcahs-shelterluv-sync"
main = "shelterluv-sync.js"
compatibility_date = "2026-06-22"

# Cron disabled — sync handled by GitHub Actions
# [triggers]
# crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "wcahs-db"
database_id = "2d709989-259d-441d-8e2e-b7cf03637fc0"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "wcahs-uploads"

# SHELTERLUV_API_KEY stored as encrypted secret via: wrangler secret put SHELTERLUV_API_KEY
